name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish WPF Application
      run: dotnet publish JamLib.Wpf/JamLib.Wpf.csproj -c Release -f net8.0-windows -r win-x64 --self-contained false
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: jamlib-build
        path: JamLib.Wpf/bin/Release/net8.0-windows/win-x64/publish/